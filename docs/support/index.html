<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>游戏搬砖宝 · 技术支持</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #0f172a; color: #f8fafc; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 20px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .app-icon { width: 40px; height: 40px; border-radius: 10px; border: 1px solid #1f2937; background: #0b1220; }
    h1 { font-size: 24px; margin: 0 0 12px; }
    p { margin: 8px 0; color: #cbd5e1; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
    input, select, textarea { width: 100%; box-sizing: border-box; background: #0b1220; border: 1px solid #22304a; color: #e5e7eb; border-radius: 8px; padding: 10px; outline: none; }
    textarea { min-height: 140px; resize: vertical; }
    .actions { display: flex; gap: 12px; margin-top: 12px; }
    .btn { cursor: pointer; border: 1px solid #1f2a44; background: #0b1220; color: #e5e7eb; padding: 10px 14px; border-radius: 8px; }
    .btn.primary { background: #2563eb; border-color: #1d4ed8; }
    .notice { margin-top: 16px; font-size: 13px; color: #94a3b8; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .footer { text-align: center; font-size: 12px; color: #64748b; margin-top: 18px; }
    a { color: #93c5fd; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <img class="app-icon" src="../assets/logo.png" alt="App Icon">
        <div>
          <h1>技术支持与反馈</h1>
          <p style="font-size:13px;color:#94a3b8;margin:0;">
            当前版本不提供登录与云端同步，所有数据仅保存在本地设备。
          </p>
        </div>
      </div>
      <p>如需帮助或提交建议与问题，可通过下方表单发送反馈。为便于排查问题，系统会附带设备与浏览器信息（不含敏感隐私）。</p>
      <p style="font-size:13px;color:#94a3b8;margin:6px 0;">
        相关页面：<a href="../privacy/">隐私政策</a> · <a href="../terms/">用户协议</a>
      </p>
      <div class="grid">
        <div>
          <label>反馈类型</label>
          <select id="type">
            <option value="feature">功能建议</option>
            <option value="bug">问题反馈</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div>
          <label>联系方式（可选）</label>
          <input id="contact" placeholder="邮箱或微信号">
        </div>
      </div>
      <div style="margin-top:12px;">
        <label>反馈内容</label>
        <textarea id="content" placeholder="请尽量详细描述，至少输入10个字"></textarea>
      </div>
      <div class="actions">
        <button class="btn" id="reset">清空</button>
        <button class="btn primary" id="submit">提交</button>
      </div>
      <div class="notice" id="notice"></div>
    </div>
    <div class="footer">
      <span>游戏搬砖宝 · 技术支持页面</span> · <a href="/">返回主页</a> · <a href="../privacy/">隐私</a> · <a href="../terms/">用户协议</a>
    </div>
  </div>
  <script>
    const endpoint = "https://tanbzdfignygxdxqfqfz.supabase.co/functions/v1/support-feedback";
    const el = {
      type: document.getElementById("type"),
      contact: document.getElementById("contact"),
      content: document.getElementById("content"),
      reset: document.getElementById("reset"),
      submit: document.getElementById("submit"),
      notice: document.getElementById("notice")
    };
    const getMeta = () => {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const device = /iPhone|iPad|iPod|Android/i.test(ua) ? "mobile" : "desktop";
      return { ua, platform, device };
    };
    const post = async (data) => {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      return { ok: res.ok && json?.ok, json };
    };
    el.reset.addEventListener("click", () => {
      el.type.value = "feature";
      el.contact.value = "";
      el.content.value = "";
      el.notice.textContent = "";
      el.notice.className = "notice";
    });
    el.submit.addEventListener("click", async () => {
      const content = el.content.value.trim();
      if (content.length < 10) {
        el.notice.textContent = "至少输入10个字";
        el.notice.className = "notice error";
        return;
      }
      el.submit.disabled = true;
      el.notice.textContent = "发送中…";
      el.notice.className = "notice";
      const meta = getMeta();
      const payload = {
        type: el.type.value,
        content,
        contact: el.contact.value.trim() || null,
        app_version: "support-web",
        platform: meta.platform,
        device: meta.device
      };
      try {
        const { ok } = await post(payload);
        if (ok) {
          el.notice.textContent = "提交成功，感谢反馈";
          el.notice.className = "notice success";
          el.content.value = "";
          el.contact.value = "";
        } else {
          throw new Error("提交失败");
        }
      } catch (_) {
        el.notice.textContent = "提交失败，请稍后再试";
        el.notice.className = "notice error";
      } finally {
        el.submit.disabled = false;
      }
    });
  </script>
</body>
</html>
